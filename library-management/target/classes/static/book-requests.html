<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Book Requests</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

body{
background:linear-gradient(135deg,#1f4037,#99f2c8);
font-family:Segoe UI;
min-height:100vh;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
background:rgba(255,255,255,0.2);
padding:15px 25px;
border-radius:12px;
backdrop-filter:blur(10px);
}

/* CARDS */
.request-card{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:0.3s;
position:relative;
overflow:hidden;
}

.request-card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* IMAGE */
.book-img{
height:120px;
width:90px;
object-fit:cover;
border-radius:10px;
}

/* STATUS */
.status{
font-size:13px;
padding:6px 12px;
border-radius:20px;
font-weight:bold;
}

.status-pending{
background:#ffc107;
color:black;
}

.status-approved{
background:#28a745;
color:white;
}

.status-rejected{
background:#dc3545;
color:white;
}

/* BUTTONS */
.btn-success{
background:linear-gradient(45deg,#28a745,#5cd65c);
border:none;
}

.btn-danger{
background:linear-gradient(45deg,#dc3545,#ff6b6b);
border:none;
}

/* LOADING */
.loader{
text-align:center;
color:white;
font-size:20px;
margin-top:50px;
}

/* TOAST */
.toast-box{
position:fixed;
top:20px;
right:20px;
background:#333;
color:white;
padding:12px 20px;
border-radius:8px;
display:none;
z-index:999;
}

</style>

</head>

<body>

<div class="container mt-4">

<div class="header">

<h3>📚 Book Requests</h3>

<a href="admin-dashboard.html" class="btn btn-dark">
<i class="bi bi-arrow-left"></i> Dashboard
</a>

</div>

<div id="loader" class="loader">Loading requests...</div>

<div class="row g-4" id="requestContainer"></div>

</div>

<div id="toast" class="toast-box"></div>

<script>

// 🔔 Toast function
function showToast(message){
const toast=document.getElementById("toast");
toast.innerText=message;
toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},3000);
}

// LOAD REQUESTS
function loadRequests(){

document.getElementById("loader").style.display="block";

fetch("http://localhost:8080/book-request/all")

.then(res=>res.json())

.then(data=>{

const container=document.getElementById("requestContainer");
container.innerHTML="";
document.getElementById("loader").style.display="none";

if(data.length===0){
container.innerHTML="<h5 class='text-white'>No requests found</h5>";
return;
}

data.forEach(req=>{

let badge="";

if(req.status==="PENDING"){
badge=`<span class="status status-pending">Pending</span>`;
}
else if(req.status==="APPROVED"){
badge=`<span class="status status-approved">Approved</span>`;
}
else{
badge=`<span class="status status-rejected">Rejected</span>`;
}

let buttons="";

if(req.status==="PENDING"){
buttons=`

<div class="mt-3">

<button class="btn btn-success btn-sm me-2"
onclick="approve(${req.id})">
<i class="bi bi-check-circle"></i> Approve
</button>

<button class="btn btn-danger btn-sm"
onclick="deny(${req.id})">
<i class="bi bi-x-circle"></i> Deny
</button>

</div>

`;
}else{
buttons=`<p class="text-muted mt-2">No Action</p>`;
}

let cover="https://cdn-icons-png.flaticon.com/512/29/29302.png";

const card=document.createElement("div");
card.className="col-md-4";

card.innerHTML=`

<div class="request-card">

<div class="d-flex">

<img src="${cover}" class="book-img me-3">

<div>

<h5>${req.bookTitle}</h5>

<p class="mb-1"><b>Student:</b> ${req.studentName}</p>

${badge}

${buttons}

</div>

</div>

</div>

`;

container.appendChild(card);

});

});

}

// APPROVE
function approve(id){

fetch("http://localhost:8080/book-request/approve/"+id,{
method:"PUT"
})

.then(async res=>{

if(!res.ok){
const msg=await res.text();
throw new Error(msg);
}

return res.json();

})

.then(()=>{
showToast("✅ Request Approved");
loadRequests();
})

.catch(err=>{
showToast("❌ "+err.message);
});

}

// DENY
function deny(id){

if(!confirm("Reject this request?")) return;

fetch("http://localhost:8080/book-request/deny/"+id,{
method:"PUT"
})

.then(res=>res.json())

.then(()=>{
showToast("❌ Request Rejected");
loadRequests();
});

}

loadRequests();

</script>

</body>

</html>
