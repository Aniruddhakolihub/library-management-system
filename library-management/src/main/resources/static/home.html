<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Library Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

body{
margin:0;
height:100vh;
background-image:url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
background-size:cover;
background-position:center;
font-family:'Segoe UI',sans-serif;
}

.overlay{
background:linear-gradient(to right,rgba(0,0,0,0.8),rgba(0,0,0,0.6));
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.hero-card{

background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:60px;
text-align:center;
color:white;
width:700px;
max-width:95%;
box-shadow:0 15px 40px rgba(0,0,0,0.5);

}

.hero-card h1{
font-size:50px;
font-weight:700;
margin-bottom:10px;
}

.hero-card p{
opacity:0.85;
margin-bottom:25px;
}

.search-box{
margin-top:20px;
}

.search-box input{
border-radius:30px;
padding:12px 20px;
}

.search-btn{
border-radius:30px;
padding:10px 25px;
}

.buttons{
margin-top:40px;
}

.buttons button{

width:220px;
margin:10px;
padding:12px;
font-size:16px;
border-radius:30px;
transition:0.3s;

}

.buttons button:hover{
transform:translateY(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.admin-btn{
background:linear-gradient(45deg,#00c6ff,#0072ff);
border:none;
}

.student-btn{
background:linear-gradient(45deg,#f7971e,#ffd200);
border:none;
color:black;
}

.dropdown-list{
position:absolute;
width:100%;
background:white;
color:black;
border-radius:10px;
margin-top:5px;
max-height:200px;
overflow-y:auto;
display:none;
}

.dropdown-list div{
padding:10px;
cursor:pointer;
}

.dropdown-list div:hover{
background:#f1f1f1;
}

</style>

</head>

<body>

<div class="overlay">

<div class="hero-card">

<h1>📚 Library Portal</h1>

<p>Search books instantly and access the digital library system</p>

<div class="search-box position-relative">

<input id="searchTitle" class="form-control" placeholder="Search book by title">

<div id="suggestions" class="dropdown-list"></div>

</div>

<button class="btn btn-primary search-btn mt-3" onclick="searchBook()">
Search Book
</button>

<div class="buttons">

<button class="btn admin-btn text-white" onclick="openAdmin()">
Admin Panel
</button>

<button class="btn student-btn" onclick="openStudent()">
Student Panel
</button>

</div>

</div>

</div>

<script>

const input = document.getElementById("searchTitle");

input.addEventListener("keyup",function(){

const value = input.value;

if(value.length===0){
document.getElementById("suggestions").style.display="none";
return;
}

fetch(`http://localhost:8080/books/search?title=${value}`)

.then(res=>res.json())

.then(data=>{

const box=document.getElementById("suggestions");

box.innerHTML="";

if(data.length===0){
box.style.display="none";
return;
}

data.forEach(book=>{

const div=document.createElement("div");

div.innerText=book.title;

div.onclick=function(){

input.value=book.title;
box.style.display="none";

}

box.appendChild(div);

});

box.style.display="block";

});

});

function searchBook(){

let title=document.getElementById("searchTitle").value;

window.location.href="/search.html?title="+title;

}

function openAdmin(){

window.location.href="/admin-login.html";

}

function openStudent(){

window.location.href="/student-login.html";

}

</script>

</body>

</html>
