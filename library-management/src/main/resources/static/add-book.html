<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

body{
background:linear-gradient(135deg,#1d4350,#a43931);
min-height:100vh;
font-family:Segoe UI;
}

.container{
margin-top:60px;
}

.form-card{

background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.4);

}

.form-control{
border-radius:10px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
color:white;
}

.btn-add{
border-radius:25px;
padding:10px 25px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>📚 Add New Book</h2>

<a href="admin-dashboard.html" class="btn btn-light">

<i class="bi bi-arrow-left"></i> Dashboard

</a>

</div>

<div class="row justify-content-center">

<div class="col-md-6">

<div class="form-card">

<div class="mb-3">

<label class="form-label">

<i class="bi bi-book"></i> Book Title

</label>

<input id="title" class="form-control" placeholder="Enter book title">

</div>

<div class="mb-3">

<label class="form-label">

<i class="bi bi-person"></i> Author

</label>

<input id="author" class="form-control" placeholder="Enter author name">

</div>

<div class="mb-3">

<label class="form-label">

<i class="bi bi-tags"></i> Category

</label>

<input id="category" class="form-control" placeholder="Enter category">

</div>

<div class="mb-3">

<label class="form-label">

<i class="bi bi-stack"></i> Quantity

</label>

<input id="quantity" type="number" class="form-control" placeholder="Enter quantity">

</div>

<button class="btn btn-success btn-add w-100" onclick="addBook()">

<i class="bi bi-plus-circle"></i> Add Book

</button>

</div>

</div>

</div>

</div>

<script>

function addBook(){

const book={

title:document.getElementById("title").value,
author:document.getElementById("author").value,
category:document.getElementById("category").value,
quantity:parseInt(document.getElementById("quantity").value)

};

fetch("http://localhost:8080/books/add",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(book)

})

.then(res=>res.json())

.then(data=>{

alert("Book Added Successfully");

document.getElementById("title").value="";
document.getElementById("author").value="";
document.getElementById("category").value="";
document.getElementById("quantity").value="";

});

}

</script>

</body>

</html>
