<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Return Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

body{
background:linear-gradient(135deg,#1f4037,#99f2c8);
min-height:100vh;
font-family:Segoe UI;
}

.container{
margin-top:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.table-card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.badge{
font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>📚 Return Books</h2>

<a href="admin-dashboard.html" class="btn btn-dark">
<i class="bi bi-arrow-left"></i> Dashboard
</a>

</div>

<div class="table-card">

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Student</th>
<th>Book</th>
<th>Issue Date</th>
<th>Return Date</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="issueTable"></tbody>

</table>

</div>

</div>

</div>

<script>

// LOAD DATA
function loadIssuedBooks(){

fetch("http://localhost:8080/issue/history")

.then(async res => {

if(!res.ok){
const text = await res.text();
throw new Error(text);
}

return res.json();

})

.then(data=>{

const table=document.getElementById("issueTable");
table.innerHTML="";

if(data.length === 0){
table.innerHTML="<tr><td colspan='7' class='text-center'>No records found</td></tr>";
return;
}

data.forEach(record=>{

let statusBadge="";
let actionBtn="";

if(record.returnDate==null){

statusBadge=`<span class="badge bg-warning text-dark">Issued</span>`;

actionBtn=`
<button class="btn btn-success btn-sm"
onclick="returnBook(${record.id})">
<i class="bi bi-arrow-return-left"></i> Return
</button>
`;

}else{

statusBadge=`<span class="badge bg-success">Returned</span>`;
actionBtn=`<span class="text-muted">Completed</span>`;

}

const row=document.createElement("tr");

row.innerHTML=`

<td>${record.id}</td>
<td>${record.student?.studentName || "N/A"}</td>
<td>${record.bookTitle}</td>
<td>${record.issueDate}</td>
<td>${record.returnDate ?? "-"}</td>
<td>${statusBadge}</td>
<td>${actionBtn}</td>

`;

table.appendChild(row);

});

})

.catch(err=>{
alert("❌ Failed to load data\n" + err.message);
console.error(err);
});

}

// RETURN BOOK
function returnBook(id){

if(!confirm("Confirm return of this book?")) return;

fetch("http://localhost:8080/issue/return/"+id,{
method:"PUT"
})

.then(async res => {

const text = await res.text();

if(!res.ok){
throw new Error(text);
}

return text;

})

.then(()=>{
alert("✅ Book returned successfully");
loadIssuedBooks();
})

.catch(err=>{
alert("❌ " + err.message);
});

}

// 🔥 AUTO REFRESH (REAL-TIME)
setInterval(loadIssuedBooks, 5000);

// INITIAL LOAD
loadIssuedBooks();

</script>

</body>

</html>
