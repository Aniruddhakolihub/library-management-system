<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>My Issued Books</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.navbar{
background:#2c3e50;
}

.navbar-brand{
color:white !important;
font-size:20px;
font-weight:bold;
}

.container{
margin-top:40px;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.table{
background:white;
border-radius:10px;
overflow:hidden;
}

.table-hover tbody tr:hover{
background:#f2f2f2;
}

.badge{
font-size:13px;
}

.book-icon{
color:#0d6efd;
font-size:18px;
margin-right:6px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark">

<div class="container-fluid">

<span class="navbar-brand">📚 My Issued Books</span>

<a href="student-dashboard.html" class="btn btn-light">

<i class="bi bi-arrow-left"></i> Dashboard

</a>

</div>

</nav>

<div class="container">

<div class="card p-4">

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Book Title</th>
<th>Issue Date</th>
<th>Return Date</th>
<th>Status</th>

</tr>

</thead>

<tbody id="issuedList">

</tbody>

</table>

</div>

</div>

</div>

<script>

// get logged in student
const studentName = localStorage.getItem("student");

// load issued books
fetch("http://localhost:8080/student/my-books/" + studentName)

.then(res => res.json())

.then(data => {

const table = document.getElementById("issuedList");

table.innerHTML = "";

if(data.length === 0){

table.innerHTML = `
<tr>
<td colspan="5" class="text-center text-danger">
No issued books found
</td>
</tr>
`;

return;
}

data.forEach(record => {

let statusBadge = "";

if(record.returnDate == null){

statusBadge = `<span class="badge bg-warning text-dark">Issued</span>`;

}else{

statusBadge = `<span class="badge bg-success">Returned</span>`;

}

const row = document.createElement("tr");

row.innerHTML = `

<td>${record.id}</td>

<td>
<i class="bi bi-book book-icon"></i>
${record.bookTitle}
</td>

<td>${record.issueDate}</td>

<td>${record.returnDate ?? "-"}</td>

<td>${statusBadge}</td>

`;

table.appendChild(row);

});

});

</script>

</body>

</html>
