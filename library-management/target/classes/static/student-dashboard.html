<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<script>

if(!localStorage.getItem("student")){
alert("Please login first");
window.location.href="student-login.html";
}

</script>

<style>

body{
background-image:url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
background-size:cover;
background-position:center;
background-attachment:fixed;
font-family:Segoe UI;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding-top:40px;
}

.navbar{
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.navbar-brand{
color:white !important;
font-weight:bold;
font-size:20px;
}

.welcome{
text-align:center;
color:white;
margin-bottom:40px;
}

.card{
border:none;
border-radius:20px;
padding:30px;
text-align:center;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
color:white;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,0.5);
}

.card i{
font-size:40px;
margin-bottom:15px;
}

.dashboard-btn{
margin-top:10px;
border-radius:30px;
}

.footer{
margin-top:60px;
text-align:center;
color:white;
opacity:0.8;
}

</style>

</head>

<body>

<div class="overlay">

<!-- NAVBAR -->

<nav class="navbar navbar-dark">

<div class="container-fluid">

<span class="navbar-brand">🎓 Student Dashboard</span>

<div>

<span class="text-white me-3">Welcome, <b id="studentName"></b></span>

<a href="home.html" class="btn btn-light btn-sm">Home</a>

<button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>

</div>

</div>

</nav>

<div class="container mt-5">

<!-- HEADER -->

<div class="welcome">

<h1>📚 Library Portal</h1>

<p>Search books and manage your library activity</p>

</div>

<!-- DASHBOARD CARDS -->

<div class="row g-4">

<!-- SEARCH BOOK -->

<div class="col-md-4">

<div class="card">

<i class="bi bi-search text-primary"></i>

<h5>Search Books</h5>

<p>Find books available in library</p>

<a href="search.html" class="btn btn-primary dashboard-btn">Open</a>

</div>

</div>

<!-- AVAILABLE BOOKS -->

<div class="col-md-4">

<div class="card">

<i class="bi bi-book text-success"></i>

<h5>Available Books</h5>

<p>Browse all books in library</p>

<a href="search.html" class="btn btn-success dashboard-btn">View</a>

</div>

</div>

<!-- MY ISSUED BOOKS -->

<div class="col-md-4">

<div class="card">

<i class="bi bi-journal-text text-warning"></i>

<h5>My Issued Books</h5>

<p>Check books you borrowed</p>

<a href="my-issued-books.html" class="btn btn-warning dashboard-btn">Open</a>

</div>

</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

<p>Library Management System | Student Portal</p>

</div>

</div>

<script>

document.getElementById("studentName").innerText = localStorage.getItem("student");

function logout(){

localStorage.removeItem("student");

window.location.href="student-login.html";

}

</script>

</body>

</html>
