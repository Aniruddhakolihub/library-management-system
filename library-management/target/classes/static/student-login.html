<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:420px;
border:none;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

</style>

</head>

<body>

<div class="card p-4">

<h3 class="text-center mb-4">Student Login</h3>

<div class="mb-3">
<label class="form-label">Student Name</label>
<input id="studentName" class="form-control" placeholder="Enter your name">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input id="password" type="password" class="form-control" placeholder="Enter password">
</div>

<button class="btn btn-primary w-100" onclick="loginStudent()">
Login
</button>

<div class="text-center mt-3">
<a href="student-register.html">Create Student Account</a>
</div>

</div>

<script>

function loginStudent(){

const name = document.getElementById("studentName").value.trim();
const password = document.getElementById("password").value.trim();

if(name === "" || password === ""){
alert("Please enter all fields");
return;
}

fetch("http://localhost:8080/student/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
studentName:name,
password:password
})

})
.then(res=>{

if(!res.ok){
throw new Error("Invalid credentials");
}

return res.json();

})
.then(data=>{

localStorage.setItem("student",data.studentName);

alert("Login successful");

window.location.href="student-dashboard.html";

})
.catch(err=>{
alert(err.message);
});

}

</script>

</body>

</html>
