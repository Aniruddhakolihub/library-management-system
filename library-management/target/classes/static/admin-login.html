<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:400px;
border:none;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

</style>

</head>

<body>

<div class="card p-4">

<h3 class="text-center mb-4">Admin Login</h3>

<div class="mb-3">

<label class="form-label">Username</label>

<input id="username" class="form-control" placeholder="Enter Username">

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<input id="password" type="password" class="form-control" placeholder="Enter Password">

</div>

<button class="btn btn-primary w-100" onclick="loginAdmin()">
Login
</button>

<div class="text-center mt-3">

<a href="admin-register.html">Create Admin Account</a>

</div>

</div>

<script>

function loginAdmin(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

fetch("http://localhost:8080/admin/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:username,
password:password
})

})
.then(res => {

if(!res.ok){
throw new Error("Invalid login credentials");
}

return res.json();

})
.then(data => {

localStorage.setItem("admin",data.username);

alert("Login Successful");

window.location.href="admin-dashboard.html";

})
.catch(err => {

alert("Invalid Username or Password");

});

}

</script>

</body>
</html>
