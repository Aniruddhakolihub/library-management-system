<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Issue Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

body{
background:linear-gradient(135deg,#283048,#859398);
min-height:100vh;
font-family:Segoe UI;
}

.container{
margin-top:60px;
}

.form-card{

background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.4);

}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
color:white;
}

.form-control{
border-radius:10px;
}

.btn-issue{
border-radius:25px;
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>📚 Issue Book</h2>

<a href="admin-dashboard.html" class="btn btn-light">

<i class="bi bi-arrow-left"></i> Dashboard

</a>

</div>

<div class="row justify-content-center">

<div class="col-md-6">

<div class="form-card">

<div class="mb-3">

<label class="form-label">

<i class="bi bi-person"></i> Student Name

</label>

<input id="studentName" class="form-control" placeholder="Enter student name">

</div>

<div class="mb-3">

<label class="form-label">

<i class="bi bi-book"></i> Book ID

</label>

<input id="bookId" type="number" class="form-control" placeholder="Enter book ID">

</div>

<button class="btn btn-success btn-issue w-100" onclick="issueBook()">

<i class="bi bi-journal-check"></i> Issue Book

</button>

</div>

</div>

</div>

</div>

<script>

function issueBook(){

const studentName = document.getElementById("studentName").value.trim();
const bookId = document.getElementById("bookId").value;

if(studentName === "" || bookId === ""){
alert("⚠️ Please enter student name and book ID");
return;
}

const record = {
student:{ studentName: studentName },
bookId: parseInt(bookId)
};

fetch("http://localhost:8080/issue/book",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify(record)
})

.then(async res => {

const text = await res.text();   // 🔥 IMPORTANT FIX

if(!res.ok){

// 🎯 Clean custom messages
if(text.includes("not available")){
throw new Error("❌ Book is not available (Out of stock)");
}

if(text.includes("Student name")){
throw new Error("❌ Invalid student name");
}

throw new Error("❌ Failed to issue book");
}

return text;

})

.then(() => {

alert("✅ Book Issued Successfully");

document.getElementById("studentName").value="";
document.getElementById("bookId").value="";

})

.catch(err => {

alert(err.message);

});

}

</script>

</body>

</html>
