<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Issued Books</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.navbar{
background:#2c3e50;
}

.navbar-brand{
color:white !important;
font-size:20px;
font-weight:bold;
}

.container{
margin-top:40px;
}

.table{
background:white;
border-radius:10px;
overflow:hidden;
}

.badge{
font-size:14px;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark">

<div class="container-fluid">

<span class="navbar-brand">📚 Issued Books</span>

<a href="admin-dashboard.html" class="btn btn-light">

<i class="bi bi-arrow-left"></i> Dashboard

</a>

</div>

</nav>

<div class="container">

<div class="card p-4">

<h4 class="mb-3">Issued Books</h4>

<button class="btn btn-primary mb-3" onclick="loadIssuedBooks()">
Refresh
</button>

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Student Name</th>
<th>Book Title</th>
<th>Issue Date</th>
<th>Return Date</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="issuedList">

</tbody>

</table>

</div>

</div>

</div>

<script>

function loadIssuedBooks(){

fetch("http://localhost:8080/issue/history")

.then(async res => {

if(!res.ok){
const text = await res.text();
throw new Error(text);
}

return res.json();
})

.then(data => {

const table = document.getElementById("issuedList");
table.innerHTML = "";

if(data.length === 0){
table.innerHTML = `<tr><td colspan="7" class="text-center">No issued books found</td></tr>`;
return;
}

data.forEach(record => {

let statusBadge = "";

if(record.returnDate == null){
statusBadge = `<span class="badge bg-warning text-dark">Issued</span>`;
}else{
statusBadge = `<span class="badge bg-success">Returned</span>`;
}

const row = document.createElement("tr");

row.innerHTML = `
<td>${record.id}</td>
<td>${record.student?.studentName || "N/A"}</td>
<td>${record.bookTitle}</td>
<td>${record.issueDate}</td>
<td>${record.returnDate ?? "-"}</td>
<td>${statusBadge}</td>
<td>
<button class="btn btn-danger btn-sm" onclick="deleteIssue(${record.id})">
<i class="bi bi-trash"></i> Delete
</button>
</td>
`;

table.appendChild(row);

});

})

.catch(err => {

alert("❌ Failed to load issued books\n" + err.message);
console.error(err);

});

}

// DELETE
function deleteIssue(id){

if(!confirm("Are you sure you want to delete this record?")) return;

fetch(`http://localhost:8080/issue/delete/${id}`,{
method:"DELETE"
})

.then(() => {

alert("✅ Issue record deleted");

loadIssuedBooks();

})

.catch(err => {
alert("❌ Delete failed");
console.log(err);
});

}

// 🔥 AUTO REFRESH EVERY 5 SECONDS (REAL-TIME FEEL)
setInterval(loadIssuedBooks, 5000);

// INITIAL LOAD
loadIssuedBooks();

</script>

</body>

</html>
